name: Buildozer APK Derleyici

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4

    - name: Java Kur
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Sistem Paketleri
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip wget \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev build-essential \
          ccache libltdl-dev openjdk-17-jdk

    - name: Android SDK Kurulum (FIXED)
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME

        cd $HOME

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-*.zip

        mkdir -p $ANDROID_HOME/cmdline-tools
        mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest

        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin

        # GERÇEK FIX: license doğru root ile
        yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses || true

        sdkmanager --sdk_root=$ANDROID_HOME \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0"

    - name: Buildozer Kur
      run: |
        pip install --upgrade pip
        pip install cython virtualenv buildozer

    - name: APK Build
      run: |
        buildozer -v android debug

    - name: APK Upload
      uses: actions/upload-artifact@v4
      with:
        name: BalikBotu-APK
        path: bin/*.apk
