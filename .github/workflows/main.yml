name: Buildozer APK Derleyici
name: Buildozer APK Derleyici

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4

    - name: Bağımlılıkları Yükle
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: Buildozer ve Cython Kurulumu
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Buildozer ile APK Derle
      run: buildozer android debug

    - name: APK Dosyasını Yükle
      uses: actions/upload-artifact@v4
      with:
        name: Metin2-Balik-Botu-APK
        path: bin/*.apk

